<!DOCTYPE html>
<html><head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: #F2EADF;
    font-family: "Inter", sans-serif;
    color: #2B2A28;
  }
  .poster {
    width: 1080px;
    height: 1350px;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .poster__text {
    padding: 88px 64px 80px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .poster__image {
    background-image: url("../../photos/victoria-portrait-eyes-closed.jpg");
    background-size: cover;
    background-position: center 30%;
    background-color: #EBE0D2;
  }

  .eyebrow {
    font-family: "Inter", sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: #A68A5B;
    padding-left: 0.45em;
    margin-bottom: 36px;
  }
  .title {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 96px;
    line-height: 1.0;
    letter-spacing: -0.005em;
    color: #2B2A28;
  }
  .title__divider {
    width: 56px;
    height: 1px;
    background: #A68A5B;
    margin: 38px 0;
  }
  .lede {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 26px;
    line-height: 1.4;
    color: #4A4642;
    max-width: 380px;
  }
  .meta {
    display: flex;
    align-items: end;
    gap: 28px;
    margin-top: 32px;
  }
  .meta__when {
    flex: 1;
    border-top: 1px solid rgba(43,42,40,0.2);
    padding-top: 18px;
  }
  .meta__when .day {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 28px;
    color: #2B2A28;
    display: block;
    line-height: 1.2;
  }
  .meta__when .time {
    font-family: "Inter", sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #A68A5B;
    margin-top: 10px;
    display: block;
    padding-left: 0.25em;
  }
  .meta__qr {
    display: flex;
    flex-direction: column;
    align-items: end;
    gap: 6px;
  }
  .meta__qr img {
    width: 100px; height: 100px;
    border: 1px solid rgba(43,42,40,0.1);
  }
  .meta__qr .label {
    font-family: "Inter", sans-serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #A68A5B;
    padding-left: 0.25em;
  }
</style>
</head><body>
  <div class="poster">
    <div class="poster__text">
      <div>
        <p class="eyebrow">Authentic Tantra</p>
        <h1 class="title">
          Body.<br />
          Breath.<br />
          Heart.
        </h1>
        <div class="title__divider"></div>
        <p class="lede">
          A&nbsp;weekly return to&nbsp;the body that knows<br />
          more than we&nbsp;remember.
        </p>
      </div>

      <div class="meta">
        <div class="meta__when">
          <span class="day">Every Wednesday</span>
          <span class="time">18:30 · Details in Telegram</span>
        </div>
        <div class="meta__qr">
          <img src="qr-telegram.png" alt="QR" />
          <span class="label">@authentic_tantra</span>
        </div>
      </div>
    </div>
    <div class="poster__image"></div>
  </div>
</body></html>
