<!DOCTYPE html>
<html><head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: #F2EADF;
    font-family: "Inter", sans-serif;
    color: #2B2A28;
    position: relative;
  }
  .poster {
    width: 1080px;
    height: 1350px;
    display: grid;
    grid-template-rows: 800px 1fr;
  }
  .poster__image {
    background-image: url("../../photos/victoria-portrait-eyes-closed.jpg");
    background-size: cover;
    background-position: center 30%;
    background-color: #EBE0D2;
    position: relative;
  }
  .poster__image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(43,42,40,0) 60%, rgba(43,42,40,0.18) 100%);
  }
  .poster__text {
    padding: 60px 80px 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 24px;
  }
  .eyebrow {
    font-family: "Inter", sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: #A68A5B;
    padding-left: 0.45em;
  }
  .title {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 112px;
    line-height: 1.02;
    letter-spacing: -0.005em;
    color: #2B2A28;
    margin-top: 8px;
  }
  .title em {
    font-style: italic;
    color: #7A2E2E;
  }
  .meta {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 24px;
    margin-top: 12px;
  }
  .meta__when {
    font-family: "Cormorant Garamond", serif;
    font-style: normal;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.4;
    color: #2B2A28;
  }
  .meta__when .day {
    display: block;
    font-style: italic;
    margin-bottom: 4px;
  }
  .meta__when .time {
    font-family: "Inter", sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #A68A5B;
    margin-top: 14px;
    padding-left: 0.2em;
  }
  .meta__qr {
    display: flex;
    flex-direction: column;
    align-items: end;
    gap: 8px;
  }
  .meta__qr img {
    width: 108px; height: 108px;
    border: 1px solid rgba(43,42,40,0.1);
  }
  .meta__qr .label {
    font-family: "Inter", sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #A68A5B;
    padding-left: 0.25em;
  }
</style>
</head><body>
  <div class="poster">
    <div class="poster__image"></div>
    <div class="poster__text">
      <div>
        <p class="eyebrow">Authentic Tantra</p>
        <h1 class="title">
          Body.<br />
          Breath.<br />
          Heart.
        </h1>
      </div>

      <div class="meta">
        <div class="meta__when">
          <span class="day">Every Wednesday</span>
          <span class="time">18:30 · Details in Telegram</span>
        </div>
        <div class="meta__qr">
          <img src="qr-telegram.png" alt="QR" />
          <span class="label">@authentic_tantra</span>
        </div>
      </div>
    </div>
  </div>
</body></html>
