<!DOCTYPE html>
<html><head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 1024px; overflow: hidden; }
  body {
    background: #2B2A28;
    position: relative;
  }
  .avatar {
    width: 1024px; height: 1024px;
    position: relative;
    overflow: hidden;
  }
  .avatar__photo {
    position: absolute;
    inset: 0;
    background-image: url("../../photos/victoria-portrait-eyes-closed.jpg");
    background-size: cover;
    background-position: 62% 38%;
    background-color: #2B2A28;
    filter: contrast(1.02) saturate(0.96);
  }
  /* Subtle radial vignette to draw eye to center */
  .avatar__vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      circle at 50% 50%,
      transparent 50%,
      rgba(43, 42, 40, 0.18) 75%,
      rgba(43, 42, 40, 0.32) 100%
    );
  }
  /* Optional: show safe-area guide on render? No — clean output. */
</style>
</head><body>
  <div class="avatar">
    <div class="avatar__photo"></div>
    <div class="avatar__vignette"></div>
  </div>
</body></html>
