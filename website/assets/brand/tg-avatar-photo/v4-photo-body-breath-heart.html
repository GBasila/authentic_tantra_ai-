<!DOCTYPE html>
<html><head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 1024px; overflow: hidden; }
  body { background: #2B2A28; position: relative; }
  .avatar { width: 1024px; height: 1024px; position: relative; overflow: hidden; }
  .avatar__photo {
    position: absolute; inset: 0;
    background-image: url("../../photos/victoria-portrait-eyes-closed.jpg");
    background-size: cover;
    background-position: 62% 28%;
    background-color: #2B2A28;
    filter: contrast(1.02) saturate(0.95) brightness(0.86);
  }
  .avatar__veil {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 50%, transparent 45%, rgba(43,42,40,0.35) 100%),
      linear-gradient(180deg, rgba(43,42,40,0.48) 0%, transparent 22%, transparent 50%, rgba(43,42,40,0.78) 100%);
  }
  /* Wordmark top — inside circle safe area */
  .avatar__wordmark {
    position: absolute;
    top: 115px;
    left: 0; right: 0;
    text-align: center;
    font-family: "Inter", sans-serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(242, 234, 223, 0.85);
    padding-left: 0.5em;
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
  }
  /* Title bottom — stacked like the poster */
  .avatar__title {
    position: absolute;
    bottom: 120px;
    left: 0; right: 0;
    text-align: center;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 86px;
    line-height: 1.0;
    letter-spacing: -0.005em;
    color: #F2EADF;
    text-shadow: 0 3px 22px rgba(0,0,0,0.55);
  }
</style>
</head><body>
  <div class="avatar">
    <div class="avatar__photo"></div>
    <div class="avatar__veil"></div>
    <p class="avatar__wordmark">Authentic Tantra</p>
    <h1 class="avatar__title">Body.<br/>Breath.<br/>Heart.</h1>
  </div>
</body></html>
