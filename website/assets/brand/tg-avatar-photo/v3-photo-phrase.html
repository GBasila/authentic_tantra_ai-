<!DOCTYPE html>
<html><head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 1024px; overflow: hidden; }
  body { background: #2B2A28; position: relative; }
  .avatar { width: 1024px; height: 1024px; position: relative; overflow: hidden; }
  .avatar__photo {
    position: absolute; inset: 0;
    background-image: url("../../photos/victoria-portrait-eyes-closed.jpg");
    background-size: cover;
    background-position: 62% 38%;
    background-color: #2B2A28;
    filter: contrast(1.02) saturate(0.96) brightness(0.9);
  }
  .avatar__veil {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 50%, transparent 50%, rgba(43,42,40,0.4) 100%),
      linear-gradient(180deg, rgba(43,42,40,0.42) 0%, transparent 24%, transparent 64%, rgba(43,42,40,0.6) 100%);
  }
  /* Wordmark top — small */
  .avatar__wordmark {
    position: absolute;
    top: 115px;
    left: 0; right: 0;
    text-align: center;
    font-family: "Inter", sans-serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(242, 234, 223, 0.85);
    padding-left: 0.5em;
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
  }
  /* Phrase bottom — italic serif */
  .avatar__phrase {
    position: absolute;
    bottom: 175px;
    left: 0; right: 0;
    text-align: center;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 400;
    font-size: 56px;
    line-height: 1.0;
    color: #F2EADF;
    text-shadow: 0 2px 16px rgba(0,0,0,0.45);
  }
  .avatar__phrase__divider {
    width: 56px;
    height: 1px;
    background: rgba(217, 201, 168, 0.7);
    margin: 16px auto 0;
  }
</style>
</head><body>
  <div class="avatar">
    <div class="avatar__photo"></div>
    <div class="avatar__veil"></div>
    <p class="avatar__wordmark">Authentic Tantra</p>
    <p class="avatar__phrase">
      Remember.
      <span class="avatar__phrase__divider" style="display:block"></span>
    </p>
  </div>
</body></html>
