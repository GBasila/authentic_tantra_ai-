<!DOCTYPE html>
<html><head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 512px; height: 512px; overflow: hidden; }
  body {
    background: #2B2A28;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center;
    font-family: "Inter", sans-serif;
  }
  .wordmark {
    font-family: "Inter", sans-serif;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: #A68A5B;
    margin-bottom: 32px;
    padding-left: 0.45em;
  }
  .phrase {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 120px;
    line-height: 1;
    letter-spacing: -0.005em;
    color: #F2EADF;
  }
  .ornament {
    margin-top: 36px;
    color: #A68A5B;
    font-size: 22px;
    letter-spacing: 0.3em;
    opacity: 0.7;
  }
</style>
</head><body>
  <p class="wordmark">Authentic Tantra</p>
  <p class="phrase">A&nbsp;return.</p>
  <p class="ornament">·&nbsp;&nbsp;&nbsp;·&nbsp;&nbsp;&nbsp;·</p>
</body></html>
