<!DOCTYPE html>
<html><head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 512px; height: 512px; overflow: hidden; }
  body {
    background: #F2EADF;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center;
    font-family: "Inter", sans-serif;
    padding: 0 36px;
  }
  .wordmark {
    font-family: "Inter", sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: #A68A5B;
    margin-bottom: 40px;
    padding-left: 0.45em;
  }
  .phrase {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 64px;
    line-height: 1.05;
    letter-spacing: -0.005em;
    color: #2B2A28;
    max-width: 430px;
  }
</style>
</head><body>
  <p class="wordmark">Authentic Tantra</p>
  <p class="phrase">There is nothing<br/>to&nbsp;learn here.</p>
</body></html>
